<!doctype html>
<html lang="es-CO">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MercadoExpress</title>
    <!-- RISK-W01: Content Security Policy.
         Connect-src restricts API calls to the API Gateway domain only.
         style-src 'unsafe-inline' is required for TailwindCSS JIT.
         frame-ancestors: none prevents clickjacking.
         base-uri: self prevents base-tag hijacking.
         form-action: self restricts form submissions. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        connect-src 'self' https://*.execute-api.us-east-1.amazonaws.com;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        font-src 'self';
        frame-ancestors 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      "
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
