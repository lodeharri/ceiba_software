# OpenSpec configuration — MercadoExpress (ceiba_software)
# Auto-generated by SDD init. Edit only safe derived context (paths, runners).
# For non-derived changes, update via orchestrator and re-run /sdd-init.

project:
  name: ceiba_software
  display_name: MercadoExpress
  description: >-
    Inventory management system for a retail chain. Technical test:
    deployable + tested. Source of truth lives in porject.md (RF-01..RF-06,
    business rules, reference data).
  root: /home/harri/development/projects/ceiba_software
  source_of_truth: porject.md
  status: greenfield
  has_existing_codebase: false

# Testing --------------------------------------------------------------
testing:
  strict_tdd: true
  tdd_workflow: red-green-triangulate-refactor
  unit_runner: vitest
  test_command: pnpm -w vitest run
  watch_command: pnpm -w vitest
  e2e_runner: playwright
  e2e_command: pnpm -w playwright test
  coverage_threshold:
    backend_domain: 80
    backend_application: 80
    frontend: 60
  tdd_rules:
    - 'Write the failing test FIRST (RED). No production code without a test.'
    - 'Minimum production code to make the test pass (GREEN).'
    - 'Triangulate with at least one more case before refactoring.'
    - 'REFACTOR only when green; never change behavior while refactoring.'
    - 'No skipping or .skip in committed tests; delete obsolete ones.'
    - 'Strict TDD is NON-NEGOTIABLE for domain/application layers.'

# Stack (locked-in) ---------------------------------------------------
# Mirrors Engram topic sdd/mercadoexpress/stack-decisions.
stack:
  language: typescript
  typescript:
    strict: true
    noUncheckedIndexedAccess: true
    project_refs: true
  package_manager: pnpm
  package_manager_version: '>=9'
  workspaces:
    - packages/backend
    - packages/frontend
    - packages/infra
    - packages/shared
  backend:
    runtime: aws-lambda
    framework: none
    framework_note: pure Lambda handlers, no Express/Fastify/NestJS
    bundler: '@aws-cdk/aws-lambda-nodejs (NodejsFunction)'
    bundler_toolchain: esbuild+tsc
    api: aws-apigateway-v2-http
    api_note: HTTP API, not REST
    lambdas:
      - auth-lambda
      - products-lambda
      - inventory-lambda
      - alerts-lambda
      - orders-lambda
  frontend:
    framework: vue3
    bundler: vite
    composition_api: true
    script_setup: lang=ts
    styling: tailwindcss
    state: pinia
    routing: vue-router
    http: ofetch
    architecture: atomic-design
    atomic_levels: [atoms, molecules, organisms, templates, pages]
    i18n: spanish
    i18n_note: UI labels in Spanish; code/comments in English
  infra:
    framework: aws-cdk
    stages: [dev, prod]
    ci: github-actions
    cicd_auth: oidc
    cicd_auth_note: no static AWS keys
  database:
    engine: postgres
    version: '16'
    extension: pgvector
    rds_instance_class: db.t3.micro
    orm: prisma
    migrations_strategy: cdk-custom-resource-prisma-migrate-deploy
    migrations_command: prisma migrate deploy
  ai:
    pattern: adapter
    ports: [EmbeddingPort, ChatPort]
    adapters_env_selectable:
      - OllamaAdapter
      - GroqAdapter
      - OpenAIAdapter
    adapters_notes:
      OllamaAdapter: local Docker, default for dev
      GroqAdapter: cloud chat, free tier
      OpenAIAdapter: optional
    rule: no provider code in domain layer

# Auth addition (user-requested, NOT in porject.md) -------------------
auth:
  added_by_user: true
  users_table:
    schema: users(id, email, username, password_hash, created_at, role)
    default_role: admin
  login_route: POST /api/v1/auth/login
  password_hash: bcrypt
  jwt:
    algorithm: HS256
    expires_in: 24h
    secret_source: env
  middleware: per-lambda-jwt-validator
  middleware_note: no Lambda authorizer

# Directory conventions (pnpm workspaces) -----------------------------
conventions:
  monorepo_root: /home/harri/development/projects/ceiba_software
  packages:
    backend:
      root: packages/backend
      src: packages/backend/src
      layout:
        domain: 'src/{bc}/domain/'
        domain_note: entities, VOs, ports
        application: 'src/{bc}/application/'
        application_note: use cases
        infrastructure: 'src/{bc}/infrastructure/'
        infrastructure_note: Prisma, JWT, bcrypt, adapters
        interface: 'src/{bc}/interface/'
        interface_note: Lambda handlers + middleware
        shared: 'src/shared/'
        shared_note: cross-BC infra utils
      bounded_contexts:
        - products
        - inventory
        - alerts
        - orders
        - auth
      tests:
        unit: 'src/**/*.test.ts'
        co_located: true
    frontend:
      root: packages/frontend
      src: packages/frontend/src
      layout:
        components: 'src/components/{atoms|molecules|organisms}/'
        templates: 'src/templates/'
        pages: 'src/pages/'
        stores: 'src/stores/'
        stores_note: Pinia
        router: 'src/router/'
        services: 'src/services/'
        services_note: ofetch wrappers
        i18n: 'src/i18n/'
        i18n_note: Spanish UI strings
      tests:
        unit: 'src/**/*.test.ts'
        co_located: true
    infra:
      root: packages/infra
      src: packages/infra/src
      layout:
        stacks: 'src/stacks/'
        constructs: 'src/constructs/'
    shared:
      root: packages/shared
      src: packages/shared/src
      contains: [zod schemas, DTOs, domain primitives, error types]

# Quality tooling -----------------------------------------------------
quality:
  linter: eslint
  eslint_config: flat
  formatter: prettier
  pre_commit:
    - husky
    - lint-staged
    - type-check
  commits: commitlint
  commit_format: conventional-commits

# OpenSpec artifact conventions ---------------------------------------
openspec:
  changes_dir: openspec/changes
  artifacts_dir: openspec/changes/{change}
  artifact_files:
    proposal: proposal.md
    spec: 'specs/*.md'
    design: design.md
    tasks: tasks.md
    apply_progress: apply-progress.md
    verify_report: verify-report.md
    archive_report: archive-report.md
  state_file: state.yaml
  change_naming: kebab-case-verb-noun
  change_examples:
    - add-inventory-mvp
    - add-auth-jwt

# SDD phase rules (Dependency Graph enforcement) ---------------------
phases:
  available: [explore, propose, spec, design, tasks, apply, verify, archive]
  dependencies:
    propose: []
    spec: [propose]
    design: [propose]
    tasks: [spec, design]
    apply: [tasks]
    verify: [spec, tasks, apply_progress]
    archive: [verify]
  rules:
    - "Spec MUST stay inside the proposal's scope."
    - 'Design MUST answer the proposal (no scope creep).'
    - 'Tasks MUST cover spec + design (every acceptance criterion).'
    - 'Apply implements tasks; no invented requirements.'
    - 'Verify validates implementation against spec; no auto-mark-reviewed.'
    - 'If strict_tdd is true, apply MUST follow red-green-triangulate-refactor.'
    - 'No source files may be created until the explore phase completes.'

# Local dev (developer ergonomics) -----------------------------------
local_dev:
  docker_compose:
    services: [postgres:16, pgvector, ollama]
  backend_local_runs:
    - sam local invoke
    - vitest (full app via test harness)
  frontend_local_run: vite
  env_files:
    - .env
    - .env.example
    - packages/*/.env.example
    - packages/frontend/.env.development
    - packages/frontend/.env.production

# Skill registry (delegator reference) -------------------------------
skills:
  registry_path: .atl/skill-registry.md
  registry_present: true
  registry_already_scanned: true
  do_not_regenerate: true
  resolver_protocol: paths-injected-via-orchestrator

# Delivery / review (sdd-tasks and sdd-apply inputs) ----------------
delivery:
  strategy: ask-on-risk
  chain_strategy: stacked-to-main
  review_lens_selection:
    - 'Naming/structure/small refactors -> review-readability'
    - 'Behavior/state/tests/determinism/regressions -> review-reliability'
    - 'Shell/process integration/partial failures -> review-resilience'
    - 'Security/permissions/data exposure/architecture -> review-risk'
    - '>400 changed lines OR hot path -> full 4R'

# Open questions (carried forward to sdd-design) --------------------
open_questions:
  - aws_region
  - cloudfront_custom_domain
  - initial_admin_user_seed_strategy
  - api_gateway_throttling
  - lambda_reserved_concurrency
  - cloudwatch_log_retention_days
