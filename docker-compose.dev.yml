# Local development stack for MercadoExpress.
#
# One-command bootstrap (after `cp .env.dev.example .env.dev`):
#
#   pnpm dev:up
#
# All hosts, ports, secrets, container names, network names, and volume names
# are interpolated from .env.dev / .env.dev.local. NEVER hardcode a port or
# URL here — see openspec/changes/replace-localstack-dev-server/design.md §3.1
# and spec REQ-DEM-* (docker-env-minimal) + REQ-EVC-* (env-vars-cleanup).
#
name: ${COMPOSE_PROJECT_NAME}

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: ${POSTGRES_CONTAINER_NAME}
    env_file:
      - .env.dev
      - .env.dev.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPORT: ${POSTGRES_PORT}
    command: ['postgres', '-c', 'port=${POSTGRES_PORT}']
    ports:
      - '${POSTGRES_PORT}:${POSTGRES_PORT}'
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init scripts: ./docker/postgres-init is the only directory mounted
      # into /docker-entrypoint-initdb.d. PostgreSQL runs every *.sql file
      # here alphabetically on first boot (when pgdata is empty).
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - local-dev
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready
          -U "$${POSTGRES_USER}"
          -d "$${POSTGRES_DB}"
          -p "$${POSTGRES_PORT}"
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES}

  localstack:
    image: ${LOCALSTACK_IMAGE}
    container_name: ${LOCALSTACK_CONTAINER_NAME}
    env_file:
      - .env.dev
      - .env.dev.local
    environment:
      SERVICES: serverless,s3,sqs,sns,secretsmanager,iam,sts,cloudformation
      DEFAULT_REGION: ${AWS_REGION}
      AWS_DEFAULT_REGION: ${AWS_REGION}
      DEBUG: ${LOCALSTACK_DEBUG}
      PERSISTENCE: ${LOCALSTACK_PERSISTENCE}
    ports:
      - '${LOCALSTACK_PORT}:${LOCALSTACK_PORT}'
    volumes:
      - localstack-data:/var/lib/localstack
    networks:
      - local-dev
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -sf
          "http://$${LOCALSTACK_HOST}:$${LOCALSTACK_PORT}/_localstack/health"
          >/dev/null
      interval: ${LOCALSTACK_HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${LOCALSTACK_HEALTHCHECK_RETRIES}

networks:
  local-dev:
    name: ${LOCAL_DEV_NETWORK_NAME}

volumes:
  pgdata:
    name: ${POSTGRES_VOLUME_NAME}
  localstack-data:
    name: ${LOCALSTACK_VOLUME_NAME}
